image: eclipse-temurin:25-jdk

stages:
  - test

test:
  stage: test
  script:
    - chmod +x gradlew
    - ./gradlew clean fatJar test -DexcludeGuiTests=true
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/tests/test/
      - build/libs/