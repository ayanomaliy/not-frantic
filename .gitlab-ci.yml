stages:
  - test

pipeline-test:
  stage: test
  image: eclipse-temurin:25-jdk

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  interruptible: true
  timeout: 10m

  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
    GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  before_script:
    - chmod +x ./gradlew

  script:
    - ./gradlew --no-daemon clean pipelineTest fatJar

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/libs/*.jar
      - build/reports/tests/
      - build/test-results/