<svg xmlns="http://www.w3.org/2000/svg"
     width="2172"
     height="724"
     viewBox="0 0 2172 724"
     fill="none">

    <defs>
        <!-- gradient for the top complement line -->
        <linearGradient id="lineGradient"
                        x1="530" y1="0"
                        x2="1642" y2="0"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7F35F7"/>
            <stop offset="45%" stop-color="#C13EFF"/>
            <stop offset="75%" stop-color="#FF5E74"/>
            <stop offset="100%" stop-color="#FF7E45"/>
        </linearGradient>

        <!-- stronger glow for the line -->
        <filter id="strongGlow"
                x="-20%" y="-300%"
                width="140%" height="700%"
                color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- softer glow for text -->
        <filter id="softGlow"
                x="-20%" y="-20%"
                width="140%" height="140%"
                color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <style>
            .mainText {
            font-family: "Orbitron", "Rajdhani", "Arial Black", Arial, sans-serif;
            font-size: 190px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 10px;
            fill: #FFFFFF;
            }

            .mainTextShadow {
            font-family: "Orbitron", "Rajdhani", "Arial Black", Arial, sans-serif;
            font-size: 190px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 10px;
            fill: #09142C;
            }
        </style>
    </defs>

    <!-- top gradient complement line -->
    <!-- glow base -->
    <line x1="530" y1="205" x2="1642" y2="205"
          stroke="url(#lineGradient)"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.55"
          filter="url(#strongGlow)"/>

    <!-- crisp line on top -->
    <line x1="530" y1="205" x2="1642" y2="205"
          stroke="url(#lineGradient)"
          stroke-width="9"
          stroke-linecap="round"/>

    <!-- text shadow -->
    <text x="1096" y="442"
          text-anchor="middle"
          class="mainTextShadow"
          opacity="0.26">&lt;THE DEVS&gt;</text>

    <!-- main text -->
    <text x="1086" y="432"
          text-anchor="middle"
          class="mainText">&lt;THE DEVS&gt;</text>

</svg>