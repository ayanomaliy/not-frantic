# ============================================================
# Dev scenario: Equality demo with Gojo
#
# Goal:
# - player1 should be Gojo in the lobby.
# - Gojo has EQUALITY and 10 cards.
# - Other players have fewer, different cards.
# - No COUNTERATTACK cards are used.
#
# Usage:
# 1. Join lobby with Gojo first, so Gojo becomes player1.
# 2. Enter: /dev equality_gojo
# 3. Start the game.
# ============================================================

# Top card on discard pile after setup
# 29 = GREEN 6
topCard=29

# Make Gojo/player1 start, so the video can immediately show Equality.
currentPlayer=player1
phase=AWAITING_PLAY

# Gojo: 10 cards, including EQUALITY.
# 111 = EQUALITY
# 90  = GREEN SKIP, playable on GREEN 6
# 86  = GREEN SECOND_CHANCE
# 88  = GREEN GIFT
# 89  = GREEN EXCHANGE
# 106 = FANTASTIC_FOUR
# 101 = FANTASTIC
# 72-74 = black cards
player1.hand=111,90,86,88,89,106,101,72,73,74

# Player 2: fewer cards, mixed but normal-looking.
# Has only 5 cards, so Equality will visibly make them draw up to Gojo's hand size.
player2.hand=120,20,75,36,54

# Player 3: fewer cards, mostly normal cards.
player3.hand=31,24,28,10,2,83

# Player 4: fewer cards, different cards.
player4.hand=97,44,57,63,81